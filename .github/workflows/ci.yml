name: CI

on:
  pull_request:
  push:

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deterministic-validation:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Configure Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Validate repository contracts
        run: npm run validate
      - name: Run complete test suite
        run: npm test
      - name: Verify install lifecycle
        run: node --test tests/validator/install-lifecycle.test.mjs
      - name: Run deterministic 24-trial corpus smoke
        run: npm run benchmark:corpus-smoke
