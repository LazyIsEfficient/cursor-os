name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish; must already be committed across every manifest
        required: true
        type: string
      confirm_publish:
        description: Confirm this run creates a public tag and GitHub release
        required: true
        type: boolean

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      version: ${{ steps.verify.outputs.version }}
      archive: ${{ steps.verify.outputs.archive }}
      sha256: ${{ steps.verify.outputs.sha256 }}
    env:
      REQUESTED_VERSION: ${{ inputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Configure Node 22
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "22"
          cache: npm
      - name: Validate requested version format
        run: |
          printf 'Requested version: %s\n' "$REQUESTED_VERSION"
          printf '%s' "$REQUESTED_VERSION" |
            grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$' ||
            { echo "requested version is not semantic" >&2; exit 1; }
      - name: Install locked dependencies
        run: npm ci --ignore-scripts
      - name: Run release tests
        run: npm run release:test
      - name: Build reproducible release artifacts
        run: npm run release:dry-run
      - name: Verify artifacts match the requested version
        id: verify
        run: |
          MANIFEST="dist/cursor-harness-$REQUESTED_VERSION.release.json"
          test -f "$MANIFEST" ||
            { echo "no release manifest for $REQUESTED_VERSION; bump every manifest and commit first" >&2; exit 1; }
          read -r VERSION ARCHIVE <<< "$(node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const manifest = JSON.parse(readFileSync(process.argv[1], "utf8"));
            process.stdout.write(`${manifest.version} ${manifest.artifacts.archive.file}`);
          ' "$MANIFEST")"
          test "$VERSION" = "$REQUESTED_VERSION" ||
            { echo "repository version $VERSION does not match requested $REQUESTED_VERSION" >&2; exit 1; }
          ( cd dist && sha256sum --check --strict "$ARCHIVE.sha256" )
          DIGEST="$(cut -d' ' -f1 < "dist/$ARCHIVE.sha256")"
          {
            printf 'version=%s\n' "$VERSION"
            printf 'archive=%s\n' "$ARCHIVE"
            printf 'sha256=%s\n' "$DIGEST"
          } >> "$GITHUB_OUTPUT"
      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-${{ github.run_id }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: package
    if: inputs.confirm_publish
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      RELEASE_COMMIT: ${{ github.sha }}
      VERSION: ${{ needs.package.outputs.version }}
      ARCHIVE: ${{ needs.package.outputs.archive }}
      DIGEST: ${{ needs.package.outputs.sha256 }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-${{ github.run_id }}
          path: dist
      - name: Re-verify artifact digest after transit
        run: |
          ( cd dist && sha256sum --check --strict "$ARCHIVE.sha256" )
          test "$(cut -d' ' -f1 < "dist/$ARCHIVE.sha256")" = "$DIGEST" ||
            { echo "artifact digest changed in transit" >&2; exit 1; }
      - name: Refuse to overwrite an existing release
        run: |
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "release v$VERSION already exists" >&2
            exit 1
          fi
      - name: Create tag and GitHub release
        run: |
          {
            printf 'Reproducible plugin payload for cursor-harness %s.\n\n' "$VERSION"
            printf -- '- Archive: `%s`\n' "$ARCHIVE"
            printf -- '- SHA-256: `%s`\n\n' "$DIGEST"
            printf 'Verify with `sha256sum --check %s.sha256`.\n' "$ARCHIVE"
          } > release-notes.md
          gh release create "v$VERSION" \
            --target "$RELEASE_COMMIT" \
            --title "cursor-harness v$VERSION" \
            --notes-file release-notes.md \
            "dist/$ARCHIVE" \
            "dist/$ARCHIVE.sha256"
